name: CI backend flask

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # 1. Робота для тестування коду
  build-container:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # v4 наразі є найбільш стабільною версією під node20

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip' # Автоматично кешує залежності, щоб тести ранилися швидше

      - name: Install libraries
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run tests
        run: python -m pytest

  # 2. Робота для збірки та деплою (запуститься ТІЛЬКИ якщо тести пройшли)
  build-and-publish:
    needs: build-container
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and push Docker image
        id: docker_build  # Додали ID, щоб отримати outputs на наступному кроці
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile  # Перевір, щоб у репозиторії файл був саме з маленькою 'f'
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/flasktest-actions-app:latest

      - name: Image digest
        run: echo "Image digest is ${{ steps.docker_build.outputs.digest }}"